services:
  csp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: csp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "file:/app/prisma/dev.db"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "8h"
      OTP_EXPIRES_MINUTES: "10"
      ALLOW_SELF_REGISTRATION: "true"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@santiagopaula.com.br}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-Admin@123}"
      SEED_ADMIN_NAME: "${SEED_ADMIN_NAME:-Administrador}"
      WHATSAPP_PROVIDER: "${WHATSAPP_PROVIDER:-evolution}"
      EVOLUTION_API_URL: "${EVOLUTION_API_URL}"
      EVOLUTION_API_KEY: "${EVOLUTION_API_KEY}"
      EVOLUTION_INSTANCE: "${EVOLUTION_INSTANCE:-csp-portal}"
      UPLOAD_DIR: "uploads"
      MAX_FILE_SIZE_MB: "100"
      STORAGE_PROVIDER: "${STORAGE_PROVIDER:-google-drive}"
      GOOGLE_DRIVE_ROOT_FOLDER_ID: "${GOOGLE_DRIVE_ROOT_FOLDER_ID:-}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REFRESH_TOKEN: "${GOOGLE_OAUTH_REFRESH_TOKEN:-}"
      # Login com Google (audience do ID token). Default = mesmo client do Drive.
      GOOGLE_LOGIN_CLIENT_ID: "${GOOGLE_LOGIN_CLIENT_ID:-${GOOGLE_OAUTH_CLIENT_ID:-}}"
      AGENT_ADMIN_URL: "${AGENT_ADMIN_URL:-}"
      AGENT_ADMIN_SECRET: "${AGENT_ADMIN_SECRET:-}"
      BOT_ENABLED: "${BOT_ENABLED:-false}"
      BOT_WEBHOOK_SECRET: "${BOT_WEBHOOK_SECRET:-}"
      SUPPORT_EVOLUTION_INSTANCE: "${SUPPORT_EVOLUTION_INSTANCE:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-haiku-4-5}"
    volumes:
      - csp-db:/app/prisma
      - csp-uploads:/app/uploads
    networks:
      - csp-internal
      - agente-pessoal-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  csp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Client ID público do login com Google (embutido no bundle).
        # Default = mesmo client do Drive.
        VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_OAUTH_CLIENT_ID:-}}"
    container_name: csp-frontend
    restart: unless-stopped
    depends_on:
      - csp-backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      # HTTP → HTTPS redirect
      - traefik.http.routers.csp-http.rule=Host(`servicedeskcsp.com.br`)
      - traefik.http.routers.csp-http.entrypoints=http
      - traefik.http.middlewares.csp-redirect-https.redirectscheme.scheme=https
      - traefik.http.routers.csp-http.middlewares=csp-redirect-https
      # HTTPS
      - traefik.http.routers.csp-https.rule=Host(`servicedeskcsp.com.br`)
      - traefik.http.routers.csp-https.entrypoints=https
      - traefik.http.routers.csp-https.tls=true
      - traefik.http.routers.csp-https.tls.certresolver=letsencrypt
      - traefik.http.services.csp.loadbalancer.server.port=80
    networks:
      - coolify
      - csp-internal

volumes:
  csp-db:
    name: csp-db
  csp-uploads:
    name: csp-uploads

networks:
  coolify:
    external: true
  # Rede do bot Sofia (AGENTE CSP) — permite ao backend alcançar a API admin do bot
  agente-pessoal-net:
    external: true
  csp-internal:
    driver: bridge
    name: csp-internal
